<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAVIN AI – Floating Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #fffdf8;
    --surface2: #f0ebe0;
    --border: rgba(0,0,0,0.08);
    --gold: #b8860b;
    --gold-mid: #d4a017;
    --gold-light: #f0c040;
    --text: #1a1208;
    --muted: #7a6a4a;
    --accent: #1a3a6b;
    --bot-bubble: #1a3a6b;
    --user-bubble: #b8860b;
    --white: #fffdf8;
    --shadow: rgba(184,134,11,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* FLOATING CONTAINER LOGIC */
  #savin-chatbot-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    font-family: 'Outfit', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }

  /* THE CHAT WINDOW */
  .page-wrapper {
    width: 380px;
    max-height: 600px;
    display: none; /* Initially hidden */
    flex-direction: column;
    gap: 10px;
    animation: slideUp 0.4s ease-out;
    margin-bottom: 15px;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* TOGGLE BUTTON */
  .chat-toggle-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--accent));
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 8px 25px var(--shadow);
    transition: transform 0.3s ease;
  }
  .chat-toggle-btn:hover { transform: scale(1.1); }

  /* HEADER */
  .brand-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 20px var(--shadow);
  }

  .brand-left { display: flex; align-items: center; gap: 10px; }
  .brand-logo {
    width: 35px; height: 35px;
    background: linear-gradient(135deg, var(--gold), var(--accent));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 700; color: white;
  }
  .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 700; color: var(--text); }
  .brand-name span { color: var(--gold); }
  .brand-tagline { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  /* CHAT CARD */
  .chat-card {
    background: var(--surface);
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow: 0 8px 30px var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .chat-body {
    height: 350px;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: linear-gradient(rgba(245,240,232,0.6), rgba(245,240,232,0.6));
  }

  /* MESSAGES & BUBBLES */
  .msg-row { display: flex; gap: 8px; animation: msgIn 0.3s ease; }
  .msg-row.user { flex-direction: row-reverse; }
  .msg-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .msg-row.bot .msg-icon { background: linear-gradient(135deg, var(--gold), var(--accent)); color: white; }
  .msg-row.user .msg-icon { background: var(--surface2); color: var(--muted); }
  .bubble { padding: 10px 14px; border-radius: 14px; font-size: 13.5px; line-height: 1.5; }
  .msg-row.bot .bubble { background: var(--bot-bubble); color: #e8f0ff; border-bottom-left-radius: 4px; }
  .msg-row.user .bubble { background: var(--user-bubble); color: white; border-bottom-right-radius: 4px; }

  /* INPUT AREA */
  .input-area { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: var(--surface); }
  .input-box { flex: 1; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; padding: 0 12px; }
